<p-table [value]="filteredBuildHistory" [loading]="loading">

    <ng-template pTemplate="header">
        <tr>
            <th>S.No</th>
            <th>Build No</th>
            <th>Environment</th>
            <th>Build Date</th>
            <th>Build Time</th>
            <th>Status</th>
            <th>Triggered By</th>
            <th>Duration</th>
            <th>Actions</th>
        </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row>
        <tr>

            <td>{{ row.sno }}</td>
            <td>{{ row.buildNo }}</td>
            <td>{{ row.environment }}</td>
            <td>{{ row.buildDate }}</td>
            <td>{{ row.buildTime }}</td>

            <td>
                <span
                  [ngClass]="{
                    'text-success': row.status === 'SUCCESS',
                    'text-danger': row.status === 'FAILED'
                  }">
                    {{ row.status }}
                </span>
            </td>

            <td>{{ row.triggeredBy }}</td>
            <td>{{ row.duration }}</td>
            <td>
                <div class="flex gap-2">
                    <p-button 
                        label="View"
                        icon="pi pi-external-link" 
                        (onClick)="openBuild(row)"
                        styleClass="p-button-text p-button-secondary">
                    </p-button>
                    
                    <p-button 
                        *ngIf="row.status === 'SUCCESS' && row.environment !== 'PROD'"
                        icon="pi pi-send" 
                        [label]="row.environment === 'DEV' ? 'Promote' : 'Deploy to Prod'"
                        (onClick)="promoteToNext(row)"
                        styleClass="p-button-sm p-button-success">
                    </p-button>
                </div>
            </td>

        </tr>
    </ng-template>

</p-table>
